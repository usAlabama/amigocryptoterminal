<head>

    <meta name="description" content="Smart notepad with formatting, tabs, themes and offline support.">

    <title>Notepad 🖍</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%233b82f6' rx='14'/><text x='50' y='72' font-size='65' font-weight='700' font-family='system-ui,sans-serif' fill='white' text-anchor='middle'>N</text></svg>">
    <style>
        /* ============================================
           RESET & BASE VARIABLES
           ============================================ */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root, html.light {
            --bg-body: #f1f5f9; --card-bg: #ffffff; --toolbar-bg: #f8fafc;
            --border-color: #e2e8f0; --btn-bg: #ffffff; --btn-border: #cbd5e1;
            --btn-text: #0f172a; --btn-hover-bg: #eef2ff; --btn-hover-border: #94a3b8;
            --clear-btn-bg: #fff1f0; --clear-btn-border: #fecaca; --clear-btn-text: #b91c1c;
            --clear-btn-hover-bg: #fee2e2; --status-bg: #f1f5f9; --status-text: #334155;
            --info-text: #475569; --shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            --editor-bg: #ffffff; --editor-text: #0f172a;
            --tab-active-bg: #3b82f6; --tab-active-text: #ffffff;
            --find-bg: #fef3c7; --find-active: #f59e0b;
            --accent: #3b82f6; --accent-hover: #2563eb;
        }
        html.dark {
            --bg-body: #0f172a; --card-bg: #1e293b; --toolbar-bg: #0f172a;
            --border-color: #334155; --btn-bg: #1e293b; --btn-border: #475569;
            --btn-text: #e2e8f0; --btn-hover-bg: #334155; --btn-hover-border: #64748b;
            --clear-btn-bg: #2d1a1a; --clear-btn-border: #7f2c2c; --clear-btn-text: #fecaca;
            --clear-btn-hover-bg: #3f2020; --status-bg: #0f172a; --status-text: #cbd5e1;
            --info-text: #94a3b8; --shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
            --editor-bg: #1e293b; --editor-text: #e2e8f0;
            --tab-active-bg: #3b82f6; --tab-active-text: #ffffff;
            --find-bg: #78350f; --find-active: #fbbf24;
            --accent: #60a5fa; --accent-hover: #3b82f6;
        }
        html.sepia {
            --bg-body: #f4ecd8; --card-bg: #fef9e6; --toolbar-bg: #faf3e0;
            --border-color: #e2dccd; --btn-bg: #fff8ed; --btn-border: #d4c9b2;
            --btn-text: #5a4a2a; --btn-hover-bg: #fff0db; --btn-hover-border: #c2b39a;
            --clear-btn-bg: #ffefdf; --clear-btn-text: #a1622b; --clear-btn-hover-bg: #ffe6d5;
            --status-bg: #f9f2e2; --status-text: #5a4a2a; --info-text: #7e6b4a;
            --shadow: 0 20px 35px -10px rgba(0,0,0,0.08);
            --editor-bg: #fffdf5; --editor-text: #3e2723;
            --tab-active-bg: #a1622b; --tab-active-text: #ffffff;
            --find-bg: #fef3c7; --find-active: #d97706;
            --accent: #a1622b; --accent-hover: #7c4e22;
        }

        /* ============================================
           LAYOUT
           ============================================ */
        body {
            margin: 0; min-height: 100vh; min-height: 100dvh;
            background: var(--bg-body);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            display: flex; justify-content: center; align-items: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            transition: background 0.3s ease;
        }
        .notepad-card {
            max-width: 1400px; width: 100%; background: var(--card-bg);
            border-radius: 1.5rem; box-shadow: var(--shadow);
            overflow: hidden; transition: background 0.3s ease, box-shadow 0.3s ease;
            display: flex; flex-direction: column;
            height: 97vh; height: 97dvh; position: relative;
        }

        /* ============================================
           TOOLBAR & SETTINGS
           ============================================ */
        .toolbar, .settings-panel {
            background: var(--toolbar-bg); padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex; flex-wrap: wrap; gap: 0.4rem;
            align-items: center; justify-content: space-between; flex-shrink: 0;
            color: var(--info-text);
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        .settings-panel { border-top: 1px solid var(--border-color); font-size: 0.8rem; border-bottom: none; }
        .settings-panel label, .settings-panel span { color: var(--btn-text); transition: color 0.3s; }
        .toolbar-group { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }

        .toolbar-mobile-toggle {
            display: none; background: none; border: 1px solid var(--btn-border);
            border-radius: 0.5rem; padding: 0.4rem 0.7rem; font-size: 1.2rem;
            color: var(--btn-text); cursor: pointer;
        }

        button, select, input[type="file"]::-webkit-file-upload-button {
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            padding: 0.45rem 0.85rem; border-radius: 2rem; font-size: 0.8rem;
            font-weight: 500; cursor: pointer; transition: all 0.15s ease;
            color: var(--btn-text); font-family: inherit; outline: none;
            min-height: 36px; display: inline-flex; align-items: center; justify-content: center;
        }
        button:hover, select:hover { background: var(--btn-hover-bg); border-color: var(--btn-hover-border); transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        input[type="color"] { padding: 0; width: 30px; height: 30px; border-radius: 50%; overflow: hidden; cursor: pointer; min-height: 30px; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
        .clear-btn { background: var(--clear-btn-bg); border-color: var(--clear-btn-border); color: var(--clear-btn-text); }
        .clear-btn:hover { background: var(--clear-btn-hover-bg); }

        /* ============================================
           EDITOR
           ============================================ */
        .editor-container {
            flex: 1; min-height: 0; display: flex; flex-direction: column;
            padding: 0.5rem 1rem 0.25rem 1rem; overflow: hidden;
            background: var(--card-bg); transition: background 0.3s;
        }
        .editor-wrapper { display: flex; gap: 1rem; height: 100%; overflow: hidden; }
        .editor-pane {
            flex: 1; display: flex; flex-direction: column; min-width: 0;
            border: 1px solid var(--border-color); border-radius: 1rem;
            overflow: hidden; background: var(--card-bg); transition: border-color 0.3s;
        }
        .editor-header {
            padding: 0.4rem 1rem; font-size: 0.75rem; font-weight: 600;
            color: var(--info-text); background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        .editor-content {
            flex: 1; padding: 1.2rem 1.5rem; overflow-y: auto;
            font-size: 16px; line-height: 1.6; outline: none;
            font-family: 'Courier New', 'Fira Code', 'Consolas', monospace;
            background: var(--editor-bg); color: var(--editor-text);
            white-space: pre-wrap; word-wrap: break-word;
            transition: background 0.3s, color 0.3s;
            -webkit-overflow-scrolling: touch;
        }
        .editor-content:empty:before { content: attr(data-placeholder); color: var(--info-text); opacity: 0.6; }
        .editor-content:focus { box-shadow: inset 0 0 0 2px var(--accent); }
        .editor-content b, .editor-content strong { font-weight: bold; }
        .editor-content i, .editor-content em { font-style: italic; }
        .editor-content u { text-decoration: underline; }
        .editor-content s, .editor-content strike { text-decoration: line-through; }
        .editor-content code { background: rgba(128,128,128,0.15); padding: 0.15em 0.4em; border-radius: 4px; font-family: monospace; font-size: 0.95em; }
        .editor-content .hidden { background: var(--editor-text); color: var(--editor-text); padding: 0 3px; border-radius: 3px; cursor: help; user-select: none; }
        .editor-content .hidden:hover { color: var(--btn-hover-border); background: transparent; }
        .editor-content blockquote { border-left: 4px solid var(--btn-hover-border); margin: 0.5em 0; padding: 0.4em 1em; color: var(--info-text); background: rgba(128,128,128,0.05); border-radius: 0 0.4rem 0.4rem 0; }
        .editor-content a { color: var(--accent); text-decoration: none; }
        .editor-content a:hover { text-decoration: underline; }
        .editor-content::selection { background: var(--accent); color: white; }

        /* ============================================
           TABS & CONTEXT MENU
           ============================================ */
        .tabs-container {
            display: flex; align-items: center; background: var(--toolbar-bg);
            border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);
            padding: 0.2rem 1rem; gap: 0.25rem; flex-shrink: 0; min-height: 40px;
            transition: background 0.3s, border-color 0.3s; position: relative;
        }
        .tabs-scroll-area {
            display: flex; gap: 0.4rem; flex: 1; overflow-x: auto;
            scrollbar-width: thin; padding-bottom: 2px; align-items: center;
        }
        .tabs-scroll-area::-webkit-scrollbar { height: 4px; }
        .tabs-scroll-area::-webkit-scrollbar-thumb { background: var(--btn-border); border-radius: 4px; }
        
        .tab-button {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.3rem 0.75rem; border-radius: 0.5rem; border: 1px solid var(--btn-border);
            background: var(--btn-bg); color: var(--btn-text); font-size: 0.75rem;
            max-width: 180px; flex: 0 0 auto; /* Prevent shrinking */
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            justify-content: space-between; transition: all 0.15s ease; 
            cursor: pointer; user-select: none; min-height: 32px; position: relative;
        }
        .tab-button.active {
            background: var(--tab-active-bg); color: var(--tab-active-text);
            border-color: var(--tab-active-bg); font-weight: bold;
        }
        .tab-button.pinned .tab-text { padding-left: 14px; position: relative; }
        .tab-button.pinned .tab-text::before {
            content: '📌'; position: absolute; left: -2px; top: 50%; 
            transform: translateY(-50%); font-size: 0.7rem;
        }
        .tab-button.drag-over { border: 2px dashed var(--accent); opacity: 0.7; }
        
        .tab-close {
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px; border-radius: 50%; font-size: 10px;
            cursor: pointer; opacity: 0.6; transition: opacity 0.15s, background 0.15s;
            flex-shrink: 0; color: inherit; font-weight: bold;
        }
        .tab-close:hover { opacity: 1; background: rgba(255,0,0,0.2); }
        .add-tab-btn { padding: 0.25rem 0.7rem; border-radius: 0.5rem; font-weight: bold; font-size: 0.9rem; flex-shrink: 0; }
        .restore-tab-btn { margin-left: 0.25rem; font-size: 0.9rem; opacity: 0.5; cursor: not-allowed; }
        .restore-tab-btn.active { opacity: 1; cursor: pointer; color: var(--accent); border-color: var(--accent); }

        /* Custom Context Menu for Tabs */
        .context-menu {
            position: absolute; display: none; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 0.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000;
            padding: 0.4rem; min-width: 160px; flex-direction: column; gap: 0.2rem;
        }
        .context-menu.show { display: flex; animation: fadeIn 0.15s ease-out; }
        .context-menu-item {
            padding: 0.5rem 0.8rem; font-size: 0.8rem; color: var(--btn-text);
            cursor: pointer; border-radius: 0.3rem; transition: background 0.1s;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .context-menu-item:hover { background: var(--btn-hover-bg); }
        .context-menu-item.danger { color: var(--clear-btn-text); }
        .context-menu-item.danger:hover { background: var(--clear-btn-hover-bg); }

        /* ============================================
           DROPDOWN MENUS
           ============================================ */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; top: calc(100% + 5px); right: 0;
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 0.75rem; padding: 0.7rem; min-width: 280px;
            max-height: 260px; overflow-y: auto; box-shadow: var(--shadow);
            z-index: 100;
        }
        .dropdown-content.grid { display: none; grid-template-columns: repeat(8, 1fr); gap: 0.3rem; }
        .dropdown-content.show { display: block; animation: fadeIn 0.15s ease-out; }
        .dropdown-content.grid.show { display: grid; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item {
            cursor: pointer; padding: 0.3rem; text-align: center;
            border-radius: 6px; font-size: 1.3rem; transition: 0.1s; user-select: none; color: var(--btn-text);
            min-height: 36px; display: flex; align-items: center; justify-content: center;
        }
        .dropdown-item.list-item { font-size: 0.85rem; justify-content: flex-start; padding: 0.5rem 1rem; }
        .dropdown-item:hover { background: var(--btn-hover-bg); transform: scale(1.1); }
        .dropdown-item.list-item:hover { transform: none; }

        /* ============================================
           FIND BAR & STATUS
           ============================================ */
        .find-bar {
            display: none; align-items: center; gap: 0.5rem;
            padding: 0.4rem 1rem; background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color); flex-shrink: 0;
            animation: fadeIn 0.15s ease-out;
        }
        .find-bar.visible { display: flex; }
        .find-bar input {
            flex: 1; max-width: 300px; padding: 0.35rem 0.8rem;
            border: 1px solid var(--btn-border); border-radius: 2rem;
            background: var(--card-bg); color: var(--btn-text);
            font-family: inherit; font-size: 0.85rem;
        }
        .find-bar input:focus { border-color: var(--accent); outline: none; }
        .find-bar .find-stats { font-size: 0.75rem; color: var(--info-text); margin-left: auto; }
        .find-bar .find-nav { display: flex; gap: 0.2rem; }

        .status-bar {
            background: var(--status-bg); padding: 0.45rem 1.25rem;
            font-size: 0.72rem; color: var(--status-text);
            display: flex; justify-content: space-between; flex-wrap: wrap;
            gap: 0.4rem; flex-shrink: 0; transition: all 0.3s;
            align-items: center;
        }
        .status-left, .status-right { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
        .status-badge { background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 0.35rem; padding: 0.15rem 0.4rem; font-size: 0.7rem; }

        /* ============================================
           TOAST NOTIFICATION
           ============================================ */
        .toast-container {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; flex-direction: column; gap: 0.4rem; pointer-events: none;
        }
        .toast {
            background: var(--card-bg); color: var(--btn-text);
            border: 1px solid var(--border-color); border-radius: 0.75rem;
            padding: 0.6rem 1.2rem; font-size: 0.85rem;
            box-shadow: var(--shadow); animation: toastIn 0.25s ease-out; pointer-events: auto; white-space: nowrap;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toast.out { animation: toastOut 0.25s ease-in forwards; }
        @keyframes toastOut { to { opacity: 0; transform: translateY(-10px); } }

        /* ============================================
           MOBILE RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            body { padding: 0; }
            .notepad-card { height: 100vh; height: 100dvh; border-radius: 0; }
            .toolbar { padding: 0.4rem 0.6rem; gap: 0.3rem; position: relative; }
            .toolbar-mobile-toggle { display: inline-flex; }
            .toolbar-groups-wrapper {
                display: none; flex-direction: column; gap: 0.4rem;
                position: absolute; top: 100%; left: 0; right: 0;
                background: var(--toolbar-bg); border-bottom: 1px solid var(--border-color);
                padding: 0.6rem; z-index: 50; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
                max-height: 60vh; overflow-y: auto;
            }
            .toolbar-groups-wrapper.open { display: flex; }
            .toolbar-group { justify-content: flex-start; flex-wrap: wrap; }
            .settings-panel { padding: 0.4rem 0.6rem; font-size: 0.75rem; }
            .editor-container { padding: 0.3rem 0.5rem; }
            .editor-content { padding: 0.8rem 1rem; font-size: 15px; }
            .editor-wrapper { gap: 0.5rem; }
            .status-bar { font-size: 0.65rem; padding: 0.35rem 0.6rem; }
            .dropdown-content { right: auto; left: 50%; transform: translateX(-50%); min-width: 260px; }
            .dropdown-content.show { animation: fadeInCenter 0.15s ease-out; transform: translateX(-50%) translateY(0); }
            @keyframes fadeInCenter { from { opacity: 0; transform: translateX(-50%) translateY(-5px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        }

        @media (max-width: 900px) {
            .editor-wrapper { flex-direction: column; }
            .editor-wrapper.split-active { flex-direction: column; }
        }
        @media (min-width: 901px) {
            .editor-wrapper.split-active { flex-direction: row; }
        }

        /* ============================================
           PRINT STYLES (Smart Mode)
           ============================================ */
        @media print {
            body { background: white; padding: 0; }
            .notepad-card { box-shadow: none; height: auto; border-radius: 0; display: block; }
            .toolbar, .settings-panel, .tabs-container, .status-bar, .find-bar, .toolbar-mobile-toggle, .context-menu { display: none !important; }
            .editor-container { padding: 0; display: block; overflow: visible; }
            .editor-wrapper { display: block; height: auto; overflow: visible; }
            .editor-pane { border: none; display: block; margin-bottom: 2rem; page-break-inside: avoid; }
            .editor-content { overflow: visible; white-space: pre-wrap; height: auto !important; padding: 0; color: #000 !important; }
            
            /* Logic for separate printing via JS classes applied to body */
            body.print-draft #secondPane { display: none !important; }
            body.print-clean .editor-pane:first-child { display: none !important; }
            body.print-all #secondPane { display: block !important; margin-top: 2rem; }
            body.print-all #secondPane::before {
                content: "=== CLEANUP ==="; display: block; font-weight: bold; margin-bottom: 1rem;
                font-family: system-ui, sans-serif; font-size: 1.2rem; border-bottom: 2px solid #333; padding-bottom: 0.3rem;
            }
        }
    </style>

<body>
<div class="notepad-card" id="mainCard">
    <div class="toolbar">
        <button class="toolbar-mobile-toggle" id="toolbarToggle" title="Menu">☰</button>
        <div class="toolbar-groups-wrapper" id="toolbarGroups">
            <div class="toolbar-group">
                <button id="copyBtn">📄 Copy</button>
                <button id="importBtn" title="Import file">📂 Import</button>
                <input type="file" id="importFile" accept=".txt,.md,.html,.json" style="display:none;">
                <button id="clearBtn" class="clear-btn">❌ Clear</button>
                <button id="splitBtn" title="Split/Merge fields">🔀 Split</button>
                <button id="findBtn" title="Find in text (Ctrl+F)">🔍 Find</button>
                
                <div class="dropdown">
                    <button id="printBtnMain" title="Print Options">🖨️ Print</button>
                    <div class="dropdown-content" id="printMenu" style="min-width:180px; padding: 0.3rem;">
                        <span class="dropdown-item list-item" onclick="printDoc('all')">📑 Print All</span>
                        <span class="dropdown-item list-item" onclick="printDoc('draft')">📝 Print Draft Only</span>
                        <span class="dropdown-item list-item" onclick="printDoc('clean')">✨ Print Cleanup Only</span>
                    </div>
                </div>
            </div>
            <div class="toolbar-group">
                <button data-fmt="bold" title="Bold (Ctrl+B)">𝐁</button>
                <button data-fmt="italic" title="Italic (Ctrl+I)">𝐼</button>
                <button data-fmt="bold-italic" title="Bold Italic (Ctrl+Shift+I)">𝑩</button>
                <button data-fmt="underline" title="Underline (Ctrl+U)">U̲</button>
                <button data-fmt="strikethrough" title="Strikethrough">S̶</button>
                <button data-fmt="monospace" title="Monospace">`</button>
                <button data-fmt="hidden" title="Hidden text">◐</button>
                <button data-fmt="link" title="Link (Ctrl+K)">🔗</button>
                <button data-fmt="quote" title="Quote">❝</button>
                <button id="undoBtn" title="Undo (Ctrl+Z)">↶</button>
                <button id="redoBtn" title="Redo (Ctrl+Y)">↷</button>
                <div class="dropdown">
                    <button id="specialCharsBtn" title="Special characters">★</button>
                    <div class="dropdown-content grid" id="specialCharsMenu"></div>
                </div>
                <div class="dropdown">
                    <button id="emojiBtn" title="Emojis">😀</button>
                    <div class="dropdown-content grid" id="emojiMenu"></div>
                </div>
            </div>

function getLuminance(hex) {
    if (!hex?.startsWith('#') || hex.length !== 7) return 0.5;
    const [r,g,b] = [1,3,5].map(i => parseInt(hex.slice(i,i+2),16)/255);
    const [rs,gs,bs] = [r,g,b].map(c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4));
    return 0.2126*rs + 0.7152*gs + 0.0722*bs;
}
function getContrastColor(hex) { return getLuminance(hex) > 0.5 ? '#0f172a' : '#e2e8f0'; }
function countWords(text) { return text && text.trim() ? text.trim().split(/\s+/).filter(w => w.length > 0).length : 0; }
function countLines(text) { return text ? text.split('\n').length : 0; }

function showToast(message, duration = 2000) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast'; toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => { toast.classList.add('out'); setTimeout(() => toast.remove(), 250); }, duration);
}

            let max = Math.max(r,g,b), min = Math.min(r,g,b), h, s, l = (max+min)/2;

        root.style.setProperty('--clear-btn-border', isLight ? '#fecaca' : '#7f2c2c'); root.style.setProperty('--clear-btn-hover-bg', isLight ? '#fee2e2' : '#3f2020');
        root.style.setProperty('--shadow', isLight ? '0 20px 35px -10px rgba(0,0,0,0.1)' : '0 20px 30px -10px rgba(0,0,0,0.6)');
        root.style.setProperty('--tab-active-bg', isLight ? '#3b82f6' : '#475569');
        root.style.setProperty('--editor-bg', settings.dialogColor || (isLight ? '#ffffff' : '#1e293b'));
        root.style.setProperty('--editor-text', getContrastColor(settings.dialogColor || '#ffffff'));
    } else {
        root.style.cssText = ''; root.classList.add(theme);
    }
    applyEditorStyles(els.ed1, settings.dialogColor); if (els.ed2) applyEditorStyles(els.ed2, settings.dialogColor);
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme==='dark'?'#0f172a':theme==='sepia'?'#f4ecd8':customColor||'#f1f5f9');
}
function applyEditorStyles(ed, bg) {
    if (!ed) return;
    ed.style.backgroundColor = bg; ed.style.color = getContrastColor(bg);
}

/* ============================================================
   FORMATTING & COUNTERS
   ============================================================ */
function applyFormat(type) {
    activeEditor.focus();
    if (type === 'link') { const u = prompt('Enter URL:', 'https://'); if (u) document.execCommand('createLink', false, u); return; }
    if (type === 'hidden') { const sel = window.getSelection(); const txt = sel.toString() || 'text'; document.execCommand('insertHTML', false, `<span class="hidden">${txt}</span>`); return; }
    if (type === 'quote') { document.execCommand('formatBlock', false, 'blockquote'); return; }
    if (type === 'monospace') { document.execCommand('fontName', false, 'monospace'); return; }
    const cmd = { bold:'bold', italic:'italic', underline:'underline', strikethrough:'strikeThrough', 'bold-italic':()=>{document.execCommand('bold');document.execCommand('italic');} }[type];
    if (typeof cmd === 'function') cmd(); else if (cmd) document.execCommand(cmd, false, null);
    updateCounters(); autoSave();
}

function insertAtCursor(txt) {
    activeEditor.focus(); const sel = window.getSelection(); if (!sel.rangeCount) return;
    let range = sel.getRangeAt(0);
    if (!activeEditor.contains(range.commonAncestorContainer)) {
        range = document.createRange(); range.selectNodeContents(activeEditor); range.collapse(false);
        sel.removeAllRanges(); sel.addRange(range);
    }
    range.deleteContents(); const node = document.createTextNode(txt); range.insertNode(node); range.collapse(false);
    sel.removeAllRanges(); sel.addRange(range);
    updateCounters(); autoSave();
}

function updateCounters() {
    const t = I18N[settings.interfaceLang || 'en'];
    const text1 = els.ed1.innerText || '', text2 = els.ed2 ? (els.ed2.innerText || '') : '';
    const c1 = text1.length, c2 = text2.length, w1 = countWords(text1), w2 = countWords(text2), l1 = countLines(text1), l2 = countLines(text2);
    els.c1.textContent = `${c1} ${t.chars} · ${w1} ${t.words}`;
    if (els.c2) els.c2.textContent = `${c2} ${t.chars} · ${w2} ${t.words}`;
    els.totalChars.textContent = `${c1 + c2} ${t.totalChars}`;
    els.totalWords.textContent = `${w1 + w2} ${t.totalWords}`;
    els.totalLines.textContent = `${l1 + l2} ${t.totalLines}`;
}

/* ============================================================
   PAGE / TAB SYSTEM & DRAG'N'DROP
   ============================================================ */
function initPagesSystem() {
    try { const stored = localStorage.getItem(STORAGE_KEYS.pagesData); if (stored) pages = JSON.parse(stored); } catch(e) { pages = []; }
    if (!pages || pages.length === 0) {
        const firstPageId = 'page_' + Date.now();
        pages = [{ id: firstPageId, name: 'Draft', html1: `<b>## Hello, Amigo! 👋</b>\n\nWelcome to your enhanced Notepad.`, html2: '', pinned: false }];
        settings.activePageId = firstPageId;
    }
    // Backward compatibility for pinned status
    pages.forEach(p => { if(typeof p.pinned === 'undefined') p.pinned = false; });
    
    if (!settings.activePageId || !pages.find(p => p.id === settings.activePageId)) settings.activePageId = pages[0].id;
    updateRestoreBtn();
}

function createNewPage() {
    const t = I18N[settings.interfaceLang || 'en'];
    const newId = 'page_' + Date.now();
    const newPage = { id: newId, name: t.defaultTabName, html1: '', html2: '', pinned: false };
    syncCurrentPage();
    pages.push(newPage);
    savePagesData(); switchPage(newId);
}

function switchPage(id) {
    syncCurrentPage();
    settings.activePageId = id; saveSettings();
    const target = pages.find(p => p.id === id);
    if (target) { els.ed1.innerHTML = target.html1; if (els.ed2) els.ed2.innerHTML = target.html2; }
    renderTabs(); updateCounters(); els.ed1.focus();
}

function deletePage(id, event) {
    if (event) event.stopPropagation();
    if (pages.length <= 1) return;
    const index = pages.findIndex(p => p.id === id);
    const deleted = pages.splice(index, 1)[0];
    trashBin.push(deleted);
    if (trashBin.length > 10) trashBin.shift(); 
    updateRestoreBtn();
    
    // We BLOCK overwriting the new tab with the old text
    let targetId = settings.activePageId;
    if (settings.activePageId === id) {
        const nextIdx = index > 0 ? index - 1 : 0;
        targetId = pages[nextIdx].id;
    }
    savePagesData(); saveSettings(); switchPage(targetId);
}

function restoreDeletedPage() {
    if (!trashBin.length) return;
    const restored = trashBin.pop();
    pages.push(restored);
    updateRestoreBtn();
    savePagesData();
    switchPage(restored.id);
    showToast(I18N[settings.interfaceLang || 'en'].restored);
}

function updateRestoreBtn() {
    if (trashBin.length > 0) els.restoreTabBtn.classList.add('active');
    else els.restoreTabBtn.classList.remove('active');
}

function renamePage(id) {
    const page = pages.find(p => p.id === id);
    if (!page) return;
    const newName = prompt(I18N[settings.interfaceLang || 'en'].renamed + ':', page.name);
    if (newName && newName.trim()) { page.name = newName.trim().substring(0, 25); savePagesData(); renderTabs(); }
}

function duplicatePage(id) {
    const page = pages.find(p => p.id === id);
    if (!page) return;
    const newId = 'page_' + Date.now();
    const newPage = { ...page, id: newId, name: page.name + ' (Copy)' };
    const index = pages.findIndex(p => p.id === id);
    pages.splice(index + 1, 0, newPage);
    savePagesData(); renderTabs();
}

function togglePinPage(id) {
    const page = pages.find(p => p.id === id);
    if (!page) return;
    page.pinned = !page.pinned;
    // Re-sort: pinned first
    pages.sort((a, b) => (b.pinned === a.pinned) ? 0 : a.pinned ? -1 : 1);
    savePagesData(); renderTabs();
}

function updateCurrentPageName() {
    const cur = pages.find(p => p.id === settings.activePageId);
    if (!cur) return;
    const plainText = els.ed1.innerText.trim();
    const t = I18N[settings.interfaceLang || 'en'];
    if (!plainText) { cur.name = t.defaultTabName; }
    else {
        let words = plainText.split(/\s+/).slice(0, 3).join(' ');
        if (words.length > 15) words = words.substring(0, 15) + '…';
        cur.name = words || t.defaultTabName;
    }
    const activeTabEl = document.querySelector(`.tab-button[data-id="${settings.activePageId}"] .tab-text`);
    if (activeTabEl) activeTabEl.textContent = cur.name;
}

function syncCurrentPage() {
    const cur = pages.find(p => p.id === settings.activePageId);
    if (cur) { cur.html1 = els.ed1.innerHTML; cur.html2 = els.ed2 ? els.ed2.innerHTML : ''; }
}

let draggedTabId = null;

function renderTabs() {
    els.tabsContainer.innerHTML = '';
    pages.forEach(p => {
        const btn = document.createElement('div');
        btn.className = `tab-button ${p.id === settings.activePageId ? 'active' : ''} ${p.pinned ? 'pinned' : ''}`;
        btn.setAttribute('data-id', p.id);
        
        // Context Menu trigger
        btn.oncontextmenu = (e) => { e.preventDefault(); openContextMenu(e, p.id); };
        btn.ondblclick = (e) => { e.preventDefault(); openContextMenu(e, p.id); };
        btn.onclick = () => switchPage(p.id);

        // Drag & Drop
        btn.draggable = true;
        btn.ondragstart = (e) => { draggedTabId = p.id; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => btn.style.opacity = '0.5', 0); };
        btn.ondragend = () => { btn.style.opacity = '1'; els.tabsContainer.querySelectorAll('.tab-button').forEach(el => el.classList.remove('drag-over')); };
        btn.ondragover = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
        btn.ondragleave = (e) => { e.currentTarget.classList.remove('drag-over'); };
        btn.ondrop = (e) => {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            if (!draggedTabId || draggedTabId === p.id) return;
            const fromIdx = pages.findIndex(x => x.id === draggedTabId);
            const toIdx = pages.findIndex(x => x.id === p.id);
            const moved = pages.splice(fromIdx, 1)[0];
            pages.splice(toIdx, 0, moved);
            // Re-sort to enforce pinned on left if mixed
            pages.sort((a, b) => (b.pinned === a.pinned) ? 0 : a.pinned ? -1 : 1);
            savePagesData(); renderTabs();
        };

        const txtSpan = document.createElement('span');
        txtSpan.className = 'tab-text'; txtSpan.textContent = p.name;
        btn.appendChild(txtSpan);
        
        if (pages.length > 1) {
            const closeSpan = document.createElement('span');
            closeSpan.className = 'tab-close'; closeSpan.innerHTML = '✕';
            closeSpan.onclick = (e) => deletePage(p.id, e);
            btn.appendChild(closeSpan);
        }
        els.tabsContainer.appendChild(btn);
    });
    const activeTab = els.tabsContainer.querySelector('.tab-button.active');
    if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function savePagesData() { localStorage.setItem(STORAGE_KEYS.pagesData, JSON.stringify(pages)); }

/* ============================================================
   CONTEXT MENU FOR TABS
   ============================================================ */
function openContextMenu(e, id) {
    contextMenuPageId = id;
    const menu = els.ctxMenu;
    menu.classList.add('show');
    
    // Position menu
    let x = e.pageX; let y = e.pageY;
    if (x + menu.offsetWidth > window.innerWidth) x = window.innerWidth - menu.offsetWidth - 10;
    if (y + menu.offsetHeight > window.innerHeight) y = window.innerHeight - menu.offsetHeight - 10;
    
    menu.style.left = `${x}px`;
    menu.style.top = `${y}px`;
}
document.addEventListener('click', (e) => {
    if (!els.ctxMenu.contains(e.target)) els.ctxMenu.classList.remove('show');
});
els.ctxRename.onclick = () => { els.ctxMenu.classList.remove('show'); renamePage(contextMenuPageId); };
els.ctxDuplicate.onclick = () => { els.ctxMenu.classList.remove('show'); duplicatePage(contextMenuPageId); };
els.ctxPin.onclick = () => { els.ctxMenu.classList.remove('show'); togglePinPage(contextMenuPageId); };
els.ctxDelete.onclick = () => { els.ctxMenu.classList.remove('show'); deletePage(contextMenuPageId); };
els.restoreTabBtn.onclick = () => restoreDeletedPage();

/* ============================================================
   SETTINGS & INIT
   ============================================================ */
function loadSettings() {
    try { const s = localStorage.getItem(STORAGE_KEYS.settings); if (s) settings = { ...DEFAULT_SETTINGS, ...JSON.parse(s) }; } catch(e) {}
    initPagesSystem();
    els.themeSelect.value = settings.theme; els.dialogColor.value = settings.dialogColor;
    els.themeColor.value = settings.theme === 'custom' ? settings.customThemeColor : (settings.theme === 'dark' ? '#0f172a' : (settings.theme === 'sepia' ? '#f4ecd8' : '#f1f5f9'));
    applyTheme(settings.theme, settings.customThemeColor);
    setFontSize(settings.fontSize);
    if (settings.interfaceLang) { els.interfaceLang.value = settings.interfaceLang; applyLanguage(settings.interfaceLang); }
    if (settings.splitMode) toggleSplitView(true); else toggleSplitView(false);
}
function saveSettings() { localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(settings)); }

function autoSave() {
    syncCurrentPage();
    updateCurrentPageName();
    savePagesData(); updateCounters();
}

function loadContent() {
    const cur = pages.find(p => p.id === settings.activePageId);
    if (cur) { els.ed1.innerHTML = cur.html1; if (els.ed2) els.ed2.innerHTML = cur.html2 || ''; }
    const lang = settings.interfaceLang || 'en';
    els.ed2.dataset.placeholder = I18N[lang]?.ph2 || 'Final version...';
    els.ed1.dataset.placeholder = I18N[lang]?.ph1 || 'Write here...';
    renderTabs(); updateCounters();
}

/* ============================================================
   FILE OPERATIONS & PRINT
   ============================================================ */
function saveFile() {
    const lang = settings.interfaceLang || 'en';
    const content = settings.splitMode ? `=== DRAFT ===\n${els.ed1.innerText}\n\n=== CLEANUP ===\n${els.ed2.innerText}` : els.ed1.innerText;
    const fmt = els.saveFormat.value;
    const fn = `note_${new Date().toISOString().slice(0,10)}`;
    const cfg = {
        md:{ext:'.md',mime:'text/markdown',wrap:c=>c}, txt:{ext:'.txt',mime:'text/plain',wrap:c=>c},
        html:{ext:'.html',mime:'text/html',wrap:c=>`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Note</title><style>body{font-family:system-ui,sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem;line-height:1.6;color:#333}</style></head><body><pre style="white-space:pre-wrap;font-family:inherit">${c.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</pre></body></html>`},
        json:{ext:'.json',mime:'application/json',wrap:c=>JSON.stringify({content:c,date:new Date().toISOString(),pages:pages.length},null,2)}
    }[fmt] || {ext:'.txt',mime:'text/plain',wrap:c=>c};
    const blob = new Blob([cfg.wrap(content)], {type: cfg.mime});
    const url = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement('a'), {href: url, download: fn + cfg.ext});
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    showToast(I18N[lang].saved);
}

function importFile(file) {
    const lang = settings.interfaceLang || 'en';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const text = e.target.result; const cur = pages.find(p => p.id === settings.activePageId);
            if (cur) { cur.html1 = text.replace(/\n/g, '<br>'); els.ed1.innerHTML = cur.html1; autoSave(); updateCounters(); showToast(I18N[lang].imported); }
        } catch(err) { showToast(I18N[lang].importFail); }
    };
    reader.onerror = () => showToast(I18N[lang].importFail);
    reader.readAsText(file);
}

// Smart Print Functionality
function printDoc(mode) {
    document.getElementById('printMenu').classList.remove('show');
    document.body.classList.remove('print-all', 'print-draft', 'print-clean');
    document.body.classList.add(`print-${mode}`);
    window.print();
    setTimeout(() => document.body.classList.remove('print-all', 'print-draft', 'print-clean'), 500);
}

    els.pane2.style.display = settings.splitMode ? 'flex' : 'none';

function setFontSize(v) {

function initMenus() {
    const build = (id, items, sp) => {
        const c = document.getElementById(id); c.innerHTML = '';
        items.forEach(i => {

    build('specialCharsMenu', SPECIAL_CHARS, ''); build('emojiMenu', EMOJIS, ' ');

    };
    tgl('specialCharsBtn', 'specialCharsMenu', 'emojiMenu');

/* ============================================================
   FIND FUNCTIONALITY
   ============================================================ */
function openFind() { els.findBar.classList.add('visible'); setTimeout(() => els.findInput.focus(), 50); }
function closeFind() { els.findBar.classList.remove('visible'); clearFindHighlights(); els.findInput.value = ''; els.findStats.textContent = ''; }
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function clearFindHighlights() {
    [els.ed1, els.ed2].forEach(ed => {
        if (!ed) return;
        ed.querySelectorAll('span.find-highlight').forEach(h => {
            const p = h.parentNode; p.replaceChild(document.createTextNode(h.textContent), h); p.normalize();
        });
    });
}

function performFind() {
    clearFindHighlights();
    const query = els.findInput.value.trim(); const lang = settings.interfaceLang || 'en';
    if (!query) { els.findStats.textContent = ''; return; }
    findMatches = [];
    [els.ed1, els.ed2].forEach((ed) => {
        if (!ed || !ed.innerText.toLowerCase().includes(query.toLowerCase())) return;
        const walker = document.createTreeWalker(ed, NodeFilter.SHOW_TEXT, null, false);
        const nodesToReplace = [];
        while (walker.nextNode()) {
            const node = walker.currentNode;
            if (new RegExp('(' + escapeRegex(query) + ')', 'gi').test(node.textContent)) nodesToReplace.push(node);
        }
        nodesToReplace.forEach(node => {
            const regex = new RegExp('(' + escapeRegex(query) + ')', 'gi');
            const parts = node.textContent.split(regex);
            const fragment = document.createDocumentFragment();
            parts.forEach(part => {
                if (regex.test(part)) {
                    const span = document.createElement('span'); span.className = 'find-highlight';
                    span.style.background = 'var(--find-bg)'; span.style.color = 'var(--editor-text)'; span.style.borderRadius = '2px';
                    span.textContent = part; fragment.appendChild(span); findMatches.push(span);
                } else fragment.appendChild(document.createTextNode(part));
            });
            node.parentNode.replaceChild(fragment, node);
        });
    });
    if (findMatches.length > 0) { findCurrent = 0; highlightCurrentMatch(); els.findStats.textContent = `1 ${I18N[lang].findOf} ${findMatches.length}`; }
    else { els.findStats.textContent = I18N[lang].findNoResults; findCurrent = -1; }
}

function highlightCurrentMatch() {
    findMatches.forEach((m, i) => { m.style.background = i === findCurrent ? 'var(--find-active)' : 'var(--find-bg)'; m.style.color = 'var(--editor-text)'; });
    if (findMatches[findCurrent]) findMatches[findCurrent].scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function findNavigate(dir) {
    if (findMatches.length === 0) return;
    const lang = settings.interfaceLang || 'en';
    findCurrent = dir === 1 ? (findCurrent + 1) % findMatches.length : (findCurrent - 1 + findMatches.length) % findMatches.length;
    highlightCurrentMatch(); els.findStats.textContent = `${findCurrent + 1} ${I18N[lang].findOf} ${findMatches.length}`;
}

els.redoBtn.onclick = () => { document.execCommand('redo'); updateCounters(); autoSave(); };

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener('keydown', e => {
    const mod = e.ctrlKey || e.metaKey;
    if (mod && e.key === 'f' && !e.shiftKey) { e.preventDefault(); els.findBar.classList.contains('visible') ? closeFind() : openFind(); return; }
    if (mod && e.key === 's') { e.preventDefault(); saveFile(); return; }
    if (mod && e.key === 'b') { e.preventDefault(); applyFormat('bold'); return; }
    if (mod && e.key === 'i' && !e.shiftKey) { e.preventDefault(); applyFormat('italic'); return; }
    if (mod && e.key === 'u') { e.preventDefault(); applyFormat('underline'); return; }
    if (mod && e.key === 'k') { e.preventDefault(); applyFormat('link'); return; }
    if (mod && e.key === 'z' && !e.shiftKey) { e.preventDefault(); document.execCommand('undo'); updateCounters(); autoSave(); return; }
    if ((mod && e.key === 'y') || (mod && e.shiftKey && e.key === 'z')) { e.preventDefault(); document.execCommand('redo'); updateCounters(); autoSave(); return; }
    if (mod && e.key === 't' && document.activeElement?.isContentEditable) { e.preventDefault(); createNewPage(); return; }
    if (e.key === 'Escape' && els.findBar.classList.contains('visible')) { closeFind(); return; }
    if (mod && e.key === 'p') { e.preventDefault(); printDoc('all'); return; }
});

window.addEventListener('beforeunload', e => {
    syncCurrentPage(); savePagesData();
    if (pages.some(p => (p.html1 && p.html1.replace(/<[^>]*>/g, '').trim().length > 0) || (p.html2 && p.html2.replace(/<[^>]*>/g, '').trim().length > 0))) { e.preventDefault(); e.returnValue = ''; }
});

if ('serviceWorker' in navigator) {
    const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => e.waitUntil(clients.claim())); self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline', {status: 503}))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], {type: 'application/javascript'}))).catch(() => {});
}

/* ============================================================
   INIT
   ============================================================ */
initMenus(); loadSettings(); loadContent(); els.ed1.focus();
</script>
